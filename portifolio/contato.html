<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Antônio</title>
    <link rel="stylesheet" href="./Assets/css/contato.css">
    <link rel="icon" href="./Assets/img/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <div class="particulas"></div>

    <img src="assets/img/Folhas1.png" alt="" class="folhas-direita" />
    <img src="assets/img/Folhas2.png" alt="" class="folhas-esquerda" />

    <nav class="navegacao">
        <div class="nav-container">
            <div class="logo">
                <img src="./Assets/img/foto.jpeg" alt="Foto Antônio" />
                <span class="menu-link">Antônio Duarte</span>
            </div>

            <ul class="menu">
                <li><a href="index.html" class="menu-link">Home</a></li>
                <li><a href="index.html#sobre" class="menu-link">Sobre Mim</a></li>
                <li><a href="projetos.html" class="menu-link">Projetos</a></li>
                <li><a href="contato.html" class="menu-link">Contato</a></li>
            </ul>
        </div>
    </nav>

    <section class="redes">
        <a href="https://github.com/tonioduarte" target="_blank" class="contato-link">
            <img width="50" height="50" src="https://img.icons8.com/ios-glyphs/50/github.png" alt="github" />
        </a>

        <a href="https://www.linkedin.com/in/tonioduarte/" target="_blank" class="contato-link">
            <img width="50" height="50" src="https://img.icons8.com/ios-filled/50/linkedin.png" alt="linkedin" />
        </a>

        <a href="https://www.instagram.com/antonioduarts/" target="_blank" class="contato-link">
            <img width="50" height="50" src="https://img.icons8.com/ios-filled/50/instagram-new--v1.png"
                alt="instagram" />
        </a>
    </section>

    <section class="contato">
        <h2 class="contato-titulo">Entre em Contato</h2>
        <form class="formulario" id="Formulario">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
            </div>
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="5" required></textarea>
            </div>
            <button type="submit" class="botao-enviar">Enviar</button>
        </form>
    </section>

</body>

</html>
